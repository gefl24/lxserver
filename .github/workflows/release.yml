name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. 初始化阶段：获取版本号和更新日志 ──────────────────────────────────────
  init:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from config
        id: get_version
        run: |
          VERSION=$(grep "version:" public/js/config.js | sed "s/.*'\(.*\)'.*/\1/")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Get Release Notes
        run: |
          awk '/^## v/ {if (p) exit; p=1} p' changelog.md > RELEASE_NOTES.md || cp changelog.md RELEASE_NOTES.md

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: RELEASE_NOTES.md

  # ── 2. 桌面端构建阶段：复用 electron-build 逻辑 ──────────────────────────────
  build_desktop:
    needs: init
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    name: Build Desktop (${{ matrix.platform }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx @electron/rebuild --version $(node -e "console.log(require('electron/package.json').version)")
        env:
          npm_config_build_from_source: true

      - name: Build JS source
        run: npm run electron:build

      - name: Package Electron app
        run: npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 复用我们之前调试好的分项目上传逻辑
      - name: Win x64 Setup
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-x64-Setup
          path: dist-electron/*x64 Setup.exe

      - name: Win x86 Setup
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-x86-Setup
          path: dist-electron/*ia32 Setup.exe

      - name: Win arm64 Setup
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-arm64-Setup
          path: dist-electron/*arm64 Setup.exe

      - name: Win x64 Portable
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-x64-Portable
          path: dist-electron/*x64 Portable.exe

      - name: Win x86 Portable
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-x86-Portable
          path: dist-electron/*ia32 Portable.exe

      - name: Win arm64 Portable
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-win-arm64-Portable
          path: dist-electron/*arm64 Portable.exe

      - name: Mac x64 DMG
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-mac-x64-dmg
          path: dist-electron/*x64.dmg

      - name: Mac arm64 DMG
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-mac-arm64-dmg
          path: dist-electron/*arm64.dmg

      - name: Linux amd64 AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-amd64-AppImage
          path: dist-electron/*x64.AppImage

      - name: Linux arm64 AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-arm64-AppImage
          path: dist-electron/*arm64.AppImage

      - name: Linux armv7l AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-armv7l-AppImage
          path: dist-electron/*armv7l.AppImage

      - name: Linux amd64 Deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-amd64-deb
          path: dist-electron/*amd64.deb

      - name: Linux arm64 Deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-arm64-deb
          path: dist-electron/*arm64.deb

      - name: Linux armv7l Deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-linux-armv7l-deb
          path: dist-electron/*armv7l.deb

  # ── 3. 服务端构建阶段：打包 Server Zip ──────────────────────────────────────
  build_server:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Zip Server
        run: |
          mkdir -p release/lx-music-sync-server
          cp -r server public scripts index.js package.json release/lx-music-sync-server/
          [ -f "config.js" ] && cp config.js release/lx-music-sync-server/
          cd release
          zip -r lx-music-sync-server-${{ needs.init.outputs.VERSION }}-server.zip lx-music-sync-server

      - name: Upload Server Zip
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-server-zip
          path: release/*.zip

  # ── 4. 发布阶段：汇总所有产物并创建 Release ──────────────────────────────────
  publish:
    needs: [init, build_desktop, build_server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Delete existing release (Cleanup)
        run: |
          gh release delete ${{ needs.init.outputs.VERSION }} --yes --cleanup-tag || echo "Release not found"
          sleep 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.init.outputs.VERSION }}
          name: LX Music Sync Server ${{ needs.init.outputs.VERSION }}
          body_path: release_assets/RELEASE_NOTES.md
          files: |
            release_assets/*.exe
            release_assets/*.dmg
            release_assets/*.AppImage
            release_assets/*.deb
            release_assets/*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
